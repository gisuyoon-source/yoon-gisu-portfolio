<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">?꾨줈?앺듃 ?곸꽭 ???ㅼ???/title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --o:#E8531A;
  --bg:#080808;--bg2:#0f0f0f;--bg3:#181818;
  --w:#F0EDE6;--w2:#C8C5BF;--w3:#6A6760;
  --bd:rgba(255,255,255,0.08);
  --pad:clamp(20px,5vw,80px);
}
html{scroll-behavior:smooth}
body{font-family:'Pretendard','Noto Sans KR',sans-serif;background:var(--bg);color:var(--w);overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--o)}
#progress{position:fixed;top:0;left:0;height:2px;background:var(--o);z-index:9999;width:0;box-shadow:0 0 8px rgba(232,83,26,.6)}

/* NAV */
.det-nav{position:sticky;top:0;z-index:500;display:flex;justify-content:space-between;align-items:center;padding:18px var(--pad);background:rgba(8,8,8,.96);border-bottom:1px solid var(--bd);backdrop-filter:blur(20px)}
.back-btn{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--w2);text-decoration:none;display:flex;align-items:center;gap:10px;transition:color .2s}
.back-btn::before{content:'??;font-size:15px}
.back-btn:hover{color:var(--o)}
.nav-brand{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:var(--w3);letter-spacing:.04em}
.nav-brand span{color:var(--o)}

/* HERO */
.det-hero{padding:80px var(--pad) 56px;border-bottom:1px solid var(--bd);max-width:900px}
.det-cat{font-family:'Outfit',sans-serif;font-size:10px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--o);display:flex;align-items:center;gap:12px;margin-bottom:20px}
.det-cat::before{content:'';width:24px;height:1px;background:var(--o)}
.det-title{font-family:'Outfit',sans-serif;font-size:clamp(24px,4.5vw,58px);font-weight:800;letter-spacing:-.03em;line-height:1.05;margin-bottom:24px}
.det-meta{display:flex;flex-wrap:wrap;gap:6px 24px}
.det-meta-chip{font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;color:var(--w3);letter-spacing:.06em;display:flex;gap:6px}
.det-meta-chip b{color:var(--w2);font-weight:700}

/* SLIDER */
.det-slider-sec{background:var(--bg3)}
.det-slider-wrap{position:relative;overflow:hidden}
.det-track{display:flex;transition:transform .4s cubic-bezier(.22,1,.36,1)}
.det-slide{min-width:100%}
.det-slide img{width:100%;height:auto;display:block}
.det-nav-btns{position:absolute;bottom:16px;right:var(--pad);display:flex;gap:6px}
.det-sbtn{width:36px;height:36px;background:rgba(8,8,8,.88);border:1px solid var(--bd);color:var(--w);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'Outfit',sans-serif}
.det-sbtn:hover{background:var(--o);color:#000}
.det-dots{position:absolute;bottom:20px;left:var(--pad);display:flex;gap:6px}
.det-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.28);border:none;padding:0;cursor:pointer;transition:all .25s}
.det-dot.active{background:var(--o);transform:scale(1.4)}

/* KPIs */
.det-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--bd);border-top:2px solid var(--o)}
.det-kpi{background:var(--bg2);padding:28px 20px;text-align:center}
.det-kpi-v{font-family:'Outfit',sans-serif;font-size:clamp(30px,4.5vw,52px);font-weight:800;color:var(--o);line-height:1;margin-bottom:8px}
.det-kpi-l{font-size:12px;color:var(--w3);letter-spacing:.04em}

/* CONTENT */
.det-content{max-width:760px;padding:72px var(--pad);display:flex;flex-direction:column;gap:52px}
.det-block-label{font-family:'Outfit',sans-serif;font-size:10px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--o);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--bd)}
.det-block-body{font-size:15px;color:var(--w2);line-height:1.95;font-weight:300}
.det-points{list-style:none;display:flex;flex-direction:column;gap:12px}
.det-points li{font-size:15px;color:var(--w2);font-weight:300;line-height:1.75;padding-left:22px;position:relative}
.det-points li::before{content:'??;position:absolute;left:0;color:var(--o);top:3px;font-size:12px}

/* FOOTER */
.det-foot{padding:48px var(--pad);border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.det-foot-copy{font-family:'Outfit',sans-serif;font-size:11px;color:var(--w3);letter-spacing:.06em}
.det-back-btn{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;padding:12px 28px;border:1px solid var(--bd);color:var(--w2);transition:all .3s}
.det-back-btn:hover{border-color:var(--o);color:var(--o)}
</style>
</head>
<body>
<div id="progress"></div>

<nav class="det-nav">
  <a class="back-btn" href="../index.html">?뚯븘媛湲?/a>
  <div class="nav-brand">Portfolio<span> /</span></div>
</nav>

<div id="detMain">
  <div style="height:60vh;display:flex;align-items:center;justify-content:center;color:var(--w3);font-family:'Outfit',sans-serif;font-size:12px;letter-spacing:.16em;text-transform:uppercase">Loading??/div>
</div>

<script>
const PROJECT_ID='p3';

window.addEventListener('scroll',()=>{
  const s=document.documentElement;
  document.getElementById('progress').style.width=((s.scrollTop/(s.scrollHeight-s.clientHeight))*100)+'%';
});

let detCur=0,detTotal=0;
function goDetSlide(n){
  detTotal=document.querySelectorAll('.det-slide').length;
  detCur=((n%detTotal)+detTotal)%detTotal;
  const t=document.getElementById('detTrack');
  if(t)t.style.transform=`translateX(-${detCur*100}%)`;
  document.querySelectorAll('.det-dot').forEach((d,i)=>d.classList.toggle('active',i===detCur));
}
function detNext(){goDetSlide(detCur+1)}
function detPrev(){goDetSlide(detCur-1)}

async function loadProject(){
  let c;
  try{const r=await fetch('../_data/content.json');c=await r.json()}
  catch(e){try{const r=await fetch('/_data/content.json');c=await r.json()}catch(e2){return}}
  const p=c.main_projects.find(x=>x.id===PROJECT_ID);
  if(!p)return;

  document.getElementById('pageTitle').textContent=p.title+' ???ㅼ???;
  const imgs=(p.panel_images||p.preview_images).map(s=>s.replace(/^images\//,'../images/'));

  document.getElementById('detMain').innerHTML=`
    <section class="det-hero">
      <div class="det-cat">${p.category}</div>
      <h1 class="det-title">${p.panel_title||p.title}</h1>
      <div class="det-meta">
        <span class="det-meta-chip">湲곌컙 <b>${p.period}</b></span>
        ${p.contrib?`<span class="det-meta-chip">湲곗뿬??<b>${p.contrib}</b></span>`:''}
      </div>
    </section>

    <section class="det-slider-sec">
      <div class="det-slider-wrap">
        <div class="det-track" id="detTrack">
          ${imgs.map(img=>`<div class="det-slide"><img src="${img}" alt="" loading="lazy"></div>`).join('')}
        </div>
        <div class="det-dots">
          ${imgs.map((_,i)=>`<button class="det-dot${i===0?' active':''}" onclick="goDetSlide(${i})"></button>`).join('')}
        </div>
        <div class="det-nav-btns">
          <button class="det-sbtn" onclick="detPrev()">??/button>
          <button class="det-sbtn" onclick="detNext()">??/button>
        </div>
      </div>
    </section>

    <div class="det-kpis">
      ${p.panel_kpis.map(k=>`<div class="det-kpi"><div class="det-kpi-v">${k[0]}</div><div class="det-kpi-l">${k[1]}</div></div>`).join('')}
    </div>

    <section class="det-content">
      <div class="det-block">
        <div class="det-block-label">臾몄젣 ?몄떇</div>
        <p class="det-block-body">${p.problem}</p>
      </div>
      <div class="det-block">
        <div class="det-block-label">湲고쉷 Point</div>
        <ul class="det-points">${p.points.map(pt=>`<li>${pt}</li>`).join('')}</ul>
      </div>
      <div class="det-block">
        <div class="det-block-label">?깃낵</div>
        <p class="det-block-body">${p.result}</p>
      </div>
    </section>

    <footer class="det-foot">
      <span class="det-foot-copy">짤 2025 ?ㅼ????ы듃?대━??/span>
      <a class="det-back-btn" href="../index.html">???ы듃?대━?ㅻ줈 ?뚯븘媛湲?/a>
    </footer>
  `;
  detTotal=imgs.length;
}
loadProject();
</script>
</body>
</html>
