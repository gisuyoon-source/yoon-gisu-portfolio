backend:
  name: git-gateway
  branch: main

media_folder: images
public_folder: /images

locale: ko

collections:
  - name: site_content
    label: "사이트 콘텐츠"
    files:

      # ── 히어로 섹션 ──────────────────────────────
      - name: hero
        label: "히어로 (메인 화면)"
        file: _data/content.json
        format: json
        fields:
          - label: "히어로"
            name: hero
            widget: object
            fields:
              - { label: "상단 한 줄 (eyebrow)", name: eyebrow, widget: string }
              - { label: "이름 영문", name: name_en, widget: string }
              - { label: "이름 한글", name: name_kr, widget: string }
              - { label: "직함 (강조)", name: position_highlight, widget: string }
              - { label: "직함 (부제)", name: position_sub, widget: string }
              - { label: "태그라인", name: tagline, widget: text, hint: "줄바꿈은 \\n 으로 입력" }
              - { label: "프로필 사진", name: profile_image, widget: image }
              - { label: "프로필 이름", name: profile_name, widget: string }
              - { label: "프로필 역할", name: profile_role, widget: string }

      # ── About 섹션 ──────────────────────────────
      - name: about
        label: "About (소개)"
        file: _data/content.json
        format: json
        fields:
          - label: "About"
            name: about
            widget: object
            fields:
              - { label: "제목 1번째 줄", name: title_line1, widget: string }
              - { label: "제목 강조 부분", name: title_accent, widget: string }
              - { label: "제목 3번째 줄", name: title_line3, widget: string }
              - { label: "자기소개 본문", name: body, widget: text }
              - label: "스킬 목록"
                name: skills
                widget: list
                fields:
                  - { label: "스킬명", name: name, widget: string }
                  - { label: "퍼센트 (0-100)", name: percent, widget: number, value_type: int, min: 0, max: 100 }
                  - { label: "태그", name: tag, widget: select, options: ["Core", "Advanced", "Proficient", "Working"] }
              - label: "경력"
                name: career
                widget: list
                fields:
                  - { label: "기관명", name: org, widget: string }
                  - { label: "기간", name: period, widget: string }
                  - { label: "상세 (부제)", name: sub, widget: string }
                  - { label: "상세 값", name: sub_val, widget: string, required: false }
              - label: "학력"
                name: education
                widget: list
                fields:
                  - { label: "학교명", name: org, widget: string }
                  - { label: "기간", name: period, widget: string }
                  - { label: "전공", name: sub, widget: string }
              - label: "자격증"
                name: qualifications
                widget: list
                fields:
                  - { label: "이름", name: name, widget: string }
                  - { label: "설명", name: val, widget: string }
              - label: "수상"
                name: awards
                widget: list
                fields:
                  - { label: "이름", name: name, widget: string }
                  - { label: "기간/내용", name: val, widget: string }

      # ── 주요 프로젝트 ──────────────────────────────
      - name: main_projects
        label: "주요 프로젝트 (Selected Work)"
        file: _data/content.json
        format: json
        fields:
          - label: "주요 프로젝트 목록"
            name: main_projects
            widget: list
            fields:
              - { label: "ID (영문, 변경 금지)", name: id, widget: string }
              - { label: "카테고리", name: category, widget: string }
              - { label: "제목 (목록)", name: title, widget: string }
              - { label: "설명 (목록)", name: desc, widget: text }
              - { label: "기간", name: period, widget: string }
              - { label: "기여도 (예: 90%)", name: contrib, widget: string }
              - label: "KPI 목록 (목록 화면)"
                name: kpis
                widget: list
                fields:
                  - { label: "수치 (예: 40×)", name: val, widget: string }
                  - { label: "라벨", name: label, widget: string }
              - label: "미리보기 이미지 (목록에 표시, 3장)"
                name: preview_images
                widget: list
                field: { label: "이미지", name: image, widget: image }
              - { label: "패널 상세 제목", name: panel_title, widget: string }
              - label: "패널 전체 이미지 (슬라이더)"
                name: panel_images
                widget: list
                field: { label: "이미지", name: image, widget: image }
              - label: "패널 KPI"
                name: panel_kpis
                widget: list
                fields:
                  - { label: "수치", name: value, widget: string }
                  - { label: "라벨", name: label, widget: string }
              - { label: "문제 인식", name: problem, widget: text }
              - label: "기획 포인트"
                name: points
                widget: list
                field: { label: "항목", name: item, widget: string }
              - { label: "성과", name: result, widget: text }

      # ── 기타 프로젝트 ──────────────────────────────
      - name: other_projects
        label: "기타 프로젝트 (Other Projects)"
        file: _data/content.json
        format: json
        fields:
          - label: "기타 프로젝트 목록"
            name: other_projects
            widget: list
            fields:
              - { label: "대표 이미지", name: image, widget: image, required: false }
              - { label: "기간", name: period, widget: string }
              - { label: "제목", name: title, widget: string }
              - { label: "한 줄 설명", name: desc, widget: string }
              - { label: "결과 한 줄", name: result, widget: string }
              - { label: "패널 카테고리", name: panel_category, widget: string, required: false }
              - { label: "패널 제목", name: panel_title, widget: string, required: false }
              - label: "패널 이미지"
                name: panel_images
                widget: list
                required: false
                field: { label: "이미지", name: image, widget: image }
              - { label: "문제 인식", name: problem, widget: text, required: false }
              - label: "기획 포인트"
                name: points
                widget: list
                required: false
                field: { label: "항목", name: item, widget: string }
              - { label: "성과 (상세)", name: result_panel, widget: text, required: false }

      # ── 연락처 섹션 ──────────────────────────────
      - name: contact
        label: "연락처 & 푸터"
        file: _data/content.json
        format: json
        fields:
          - label: "사이트 기본 정보"
            name: site
            widget: object
            fields:
              - { label: "이메일", name: email, widget: string }
              - { label: "LinkedIn URL", name: linkedin_url, widget: string }
              - { label: "LinkedIn 표시 텍스트", name: linkedin_label, widget: string }
          - label: "Contact 섹션"
            name: contact
            widget: object
            fields:
              - { label: "제목 1번째 줄", name: title_line1, widget: string }
              - { label: "제목 강조", name: title_accent, widget: string }
              - { label: "제목 3번째 줄", name: title_line3, widget: string }
              - { label: "부제", name: sub, widget: string }
              - { label: "이메일 버튼 텍스트", name: email_label, widget: string }
              - { label: "LinkedIn 버튼 텍스트", name: linkedin_label, widget: string }
          - label: "푸터"
            name: footer
            widget: object
            fields:
              - { label: "이름 (한글)", name: name_kr, widget: string }
              - { label: "이름 (영문)", name: name_en, widget: string }
              - { label: "역할", name: role, widget: string }
              - { label: "소속", name: company, widget: string }
              - { label: "저작권 문구", name: copyright, widget: string }
